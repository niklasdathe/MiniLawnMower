name: Requirement
description: Create a traceable product requirement for the mini lawnmower.
title: "[REQ] "
labels: ["requirement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for statements that must remain traceable over the full product lifecycle.
        Examples: runtime, stop time, slope capability, ingress protection, telemetry range, charging time, or maximum noise.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I searched for an existing requirement or related issue.
          required: true
        - label: This is a product-level requirement, not a build task or experiment.
          required: true

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      description: Primary area affected by this requirement.
      options:
        - System
        - Chassis
        - Drive
        - Cutting system
        - Power / Battery
        - Charging / Solar
        - Control / Firmware
        - Connectivity / Telemetry
        - Sensors / Safety
        - Manufacturing / Assembly
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Must
        - Should
        - Could
    validations:
      required: true

  - type: textarea
    id: requirement-statement
    attributes:
      label: Requirement statement
      description: Write one clear verifiable statement.
      placeholder: The mower shall...
      render: markdown
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Why does this requirement exist?
      placeholder: User need, safety reason, engineering constraint, regulation, benchmark, etc.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: State exactly what must be true for this requirement to be accepted.
      placeholder: |
        - Runtime >= 45 min on flat grass
        - Emergency stop reaction <= 200 ms
        - Must operate on slope up to 15°
      render: markdown
    validations:
      required: true

  - type: dropdown
    id: verification-method
    attributes:
      label: Verification method
      description: Primary verification method planned.
      options:
        - Test
        - Analysis / Calculation
        - Inspection
        - Demonstration
        - Combination
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints and boundaries
      description: Add assumptions, exclusions, operating conditions, and interfaces.
      placeholder: Temperature range, grass conditions, battery state, payload, measurement setup, etc.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: traceability
    attributes:
      label: Traceability links
      description: Link related issues, discussions, commits, documents, or external references.
      placeholder: |
        Parent requirement: #12
        Related implementation: #34
        Planned verification: #56
        Discussion: #78
      render: markdown
    validations:
      required: false
