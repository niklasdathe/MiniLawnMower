name: Bug / Defect
description: Report a defect in mechanics, electronics, firmware, integration, documentation, or tests.
title: "[BUG] "
labels:
  - "type: defect"
body:
  - type: markdown
    attributes:
      value: |
        Use this form for an observed defect against expected behavior.
        The defect can be physical, electrical, logical, or documentation-related.

  - type: dropdown
    id: discipline
    attributes:
      label: Discipline
      description: Which engineering domain mainly owns this issue?
      options:
        - Mechanical
        - Electronics / power
        - Firmware / software
        - Test / validation
        - Systems / integration
        - Manufacturing / documentation
        - Multi-disciplinary
    validations:
      required: true

  - type: dropdown
    id: assembly
    attributes:
      label: Assembly / module
      description: Which physical or logical assembly is primarily affected?
      options:
        - Cutting module
        - Drive module
        - Energy module
        - Charging / solar module
        - Control module
        - Sensor module
        - Chassis / enclosure
        - HMI / lighting
        - Logging / telemetry
        - Safety
        - System-wide / cross-cutting
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: Parent issue
      description: Link the higher-level requirement, feature, or epic if one exists.
      placeholder: '#123'

  - type: textarea
    id: related_work
    attributes:
      label: Related issues / PRs / discussions
      description: Link any connected work items.
      placeholder: |-
        Related: #45
        Blocks: #67
        Decision record: #89

  - type: dropdown
    id: defect_type
    attributes:
      label: Defect type
      options:
        - Functional failure
        - Performance shortfall
        - Safety issue
        - Intermittent behavior
        - Manufacturing / assembly defect
        - Documentation defect
        - Test artifact / tooling issue
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      placeholder: Cutting motor restarts unexpectedly after transient undervoltage.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: System should remain latched off until explicit reset.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |-
        1. Run profile X
        2. Load battery to Y V
        3. Trigger event Z.
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      placeholder: Logs, pictures, oscilloscope captures, test issue, commit, hardware revision.

  - type: input
    id: affects_requirement
    attributes:
      label: Affected requirement
      placeholder: '#123'
