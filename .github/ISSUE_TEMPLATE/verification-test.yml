name: Verification Test
description: Define or record a test that verifies a requirement or validates an implementation.
title: "[TEST] "
labels:
  - "type: verification"
body:
  - type: markdown
    attributes:
      value: |
        Use this form for planned or executed tests.
        Prefer one test issue per test objective.

  - type: dropdown
    id: discipline
    attributes:
      label: Discipline
      description: Which engineering domain mainly owns this issue?
      options:
        - Mechanical
        - Electronics / power
        - Firmware / software
        - Test / validation
        - Systems / integration
        - Manufacturing / documentation
        - Multi-disciplinary
    validations:
      required: true

  - type: dropdown
    id: assembly
    attributes:
      label: Assembly / module
      description: Which physical or logical assembly is primarily affected?
      options:
        - Cutting module
        - Drive module
        - Energy module
        - Charging / solar module
        - Control module
        - Sensor module
        - Chassis / enclosure
        - HMI / lighting
        - Logging / telemetry
        - Safety
        - System-wide / cross-cutting
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: Parent issue
      description: Link the higher-level requirement, feature, or epic if one exists.
      placeholder: '#123'

  - type: textarea
    id: related_work
    attributes:
      label: Related issues / PRs / discussions
      description: Link any connected work items.
      placeholder: |-
        Related: #45
        Blocks: #67
        Decision record: #89

  - type: dropdown
    id: test_level
    attributes:
      label: Test level
      options:
        - Unit / bench
        - Assembly / subsystem
        - Integration
        - System
        - Environmental / durability
        - Safety
    validations:
      required: true

  - type: input
    id: verifies
    attributes:
      label: Requirement or issue verified
      description: Link the requirement, change, or bug this test covers.
      placeholder: '#123'
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Test objective
      placeholder: Verify that the mower detects lift-off from the ground and disables cutting within the required response time.
    validations:
      required: true

  - type: textarea
    id: setup
    attributes:
      label: Setup / instrumentation
      placeholder: Bench supply, current probe, IMU log stream, test jig, firmware version, environmental conditions.
    validations:
      required: true

  - type: textarea
    id: procedure
    attributes:
      label: Procedure
      placeholder: |-
        1. Arm system
        2. Spin up cutting motor
        3. Trigger lift condition
        4. Record stop time and current decay.
    validations:
      required: true

  - type: textarea
    id: pass_fail
    attributes:
      label: Pass / fail criteria
      placeholder: Pass if stop time <= X ms and no restart occurs without manual reset.
    validations:
      required: true

  - type: textarea
    id: results
    attributes:
      label: Results / evidence
      placeholder: Attach logs, plots, photos, video links, and measured values.

  - type: checkboxes
    id: evidence_check
    attributes:
      label: Evidence check
      options:
        - label: I linked the requirement or work item being verified.
          required: true
        - label: I defined objective pass/fail criteria.
          required: true
