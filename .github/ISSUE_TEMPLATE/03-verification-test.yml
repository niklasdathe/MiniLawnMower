name: Verification Test
description: Define a test that verifies a requirement, design choice, or fix.
title: "[TEST] "
labels: ["verification-test"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form for structured verification work.
        Examples: runtime test, stop-time measurement, slope test, connectivity range test, current draw measurement, ingress check, or firmware regression test.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I linked the requirement, change, or bug this test verifies.
          required: true
        - label: I defined objective pass/fail criteria.
          required: true

  - type: dropdown
    id: test-level
    attributes:
      label: Test level
      options:
        - Component
        - Subsystem
        - Integration
        - System
        - Field test
    validations:
      required: true

  - type: dropdown
    id: subsystem
    attributes:
      label: Subsystem
      options:
        - System
        - Chassis
        - Drive
        - Cutting system
        - Power / Battery
        - Charging / Solar
        - Control / Firmware
        - Connectivity / Telemetry
        - Sensors / Safety
        - Manufacturing / Assembly
        - Documentation
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Test objective
      placeholder: Verify that the mower can run continuously for at least 45 minutes on short dry grass.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: linked-items
    attributes:
      label: Linked requirement / issue
      placeholder: |
        Requirement: #14
        Implementation task: #32
        Bug fix: #61
      render: markdown
    validations:
      required: true

  - type: textarea
    id: setup
    attributes:
      label: Test setup
      description: Describe DUT, instrumentation, firmware version, battery state, environment, and configuration.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: procedure
    attributes:
      label: Procedure
      description: Step-by-step execution plan.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: pass-fail
    attributes:
      label: Pass / fail criteria
      render: markdown
    validations:
      required: true

  - type: textarea
    id: measurements
    attributes:
      label: Data to record
      description: State which measurements, logs, media, and attachments must be captured.
      placeholder: Time, current, voltage, wheel speed, GPS trace, RSSI, photos, screen recordings, etc.
      render: markdown
    validations:
      required: false
