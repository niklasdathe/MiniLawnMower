name: Implementation Task
description: Plan a concrete implementation step for mechanics, electronics, firmware, or integration.
title: "[TASK] "
labels:
  - "type: implementation"
body:
  - type: markdown
    attributes:
      value: |
        Use this form for executable work.
        Keep one task focused on one discipline and one assembly whenever possible.

  - type: dropdown
    id: discipline
    attributes:
      label: Discipline
      description: Which engineering domain mainly owns this issue?
      options:
        - Mechanical
        - Electronics / power
        - Firmware / software
        - Test / validation
        - Systems / integration
        - Manufacturing / documentation
        - Multi-disciplinary
    validations:
      required: true

  - type: dropdown
    id: assembly
    attributes:
      label: Assembly / module
      description: Which physical or logical assembly is primarily affected?
      options:
        - Cutting module
        - Drive module
        - Energy module
        - Charging / solar module
        - Control module
        - Sensor module
        - Chassis / enclosure
        - HMI / lighting
        - Logging / telemetry
        - Safety
        - System-wide / cross-cutting
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: Parent issue
      description: Link the higher-level requirement, feature, or epic if one exists.
      placeholder: '#123'

  - type: textarea
    id: related_work
    attributes:
      label: Related issues / PRs / discussions
      description: Link any connected work items.
      placeholder: |-
        Related: #45
        Blocks: #67
        Decision record: #89

  - type: dropdown
    id: task_kind
    attributes:
      label: Task kind
      options:
        - Design
        - Calculation / sizing
        - CAD / schematic / PCB
        - Firmware implementation
        - Integration / bring-up
        - Documentation
        - Review / refactor
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
      label: Objective
      placeholder: Implement blade motor soft-start in motor-control firmware and expose status over telemetry.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope and deliverable
      description: What exactly will be produced or changed?
      placeholder: Updated control code, test log, wiring diagram, and current-limit parameter table.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: Code merged, startup current captured, no watchdog resets, and test bench results attached.
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies / blockers
      placeholder: Needs component decision from #54 and system requirement #12.

  - type: checkboxes
    id: completion_check
    attributes:
      label: Planning check
      options:
        - label: This task is small enough to complete and review.
          required: true
        - label: I linked the driving requirement, bug, or experiment where relevant.
          required: true
