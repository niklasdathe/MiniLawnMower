name: Change Request
description: Propose a controlled change to an agreed baseline such as architecture, requirement values, selected parts, or interfaces.
title: "[CR] "
labels: ["change-request"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when an agreed baseline needs to change.
        Examples: changing battery voltage, wheel diameter, selected MCU, communication protocol, requirement values, or safety concept.

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-checks
      options:
        - label: I described the current baseline and the proposed new baseline.
          required: true
        - label: I identified the likely impacts on requirements, design, BOM, tests, or schedule.
          required: true

  - type: dropdown
    id: scope
    attributes:
      label: Change scope
      options:
        - Requirement
        - Architecture
        - Hardware component
        - Firmware / Software
        - Mechanical design
        - Interface / Protocol
        - Test strategy
        - Manufacturing / Assembly
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - Immediate
        - Next iteration
        - Planned future change
    validations:
      required: true

  - type: textarea
    id: current-baseline
    attributes:
      label: Current baseline
      description: What is the current approved state?
      render: markdown
    validations:
      required: true

  - type: textarea
    id: proposed-change
    attributes:
      label: Proposed change
      description: What exactly should change?
      render: markdown
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for change
      description: Why is this change needed?
      render: markdown
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact assessment
      description: Cover requirements, design, BOM, software, test plan, cost, risk, and schedule.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: decision-needed
    attributes:
      label: Decision needed
      description: What approval or next action is required?
      placeholder: Approve 24 V architecture and trigger motor driver re-selection.
      render: markdown
    validations:
      required: true

  - type: textarea
    id: links
    attributes:
      label: Related links
      placeholder: |
        Affected requirement: #4
        Superseded evaluation: #18
        Follow-up task: #52
        Verification update: #61
      render: markdown
    validations:
      required: false
