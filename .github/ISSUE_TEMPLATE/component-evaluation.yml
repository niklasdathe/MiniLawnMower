name: Component Evaluation
description: Compare candidate parts, modules, or materials before making a selection.
title: "[EVAL] "
labels:
  - "type: component-evaluation"
body:
  - type: markdown
    attributes:
      value: |
        Use this form when selecting a component, material, sensor, motor, battery, driver, connector, sealing concept, or module.

  - type: dropdown
    id: discipline
    attributes:
      label: Discipline
      description: Which engineering domain mainly owns this issue?
      options:
        - Mechanical
        - Electronics / power
        - Firmware / software
        - Test / validation
        - Systems / integration
        - Manufacturing / documentation
        - Multi-disciplinary
    validations:
      required: true

  - type: dropdown
    id: assembly
    attributes:
      label: Assembly / module
      description: Which physical or logical assembly is primarily affected?
      options:
        - Cutting module
        - Drive module
        - Energy module
        - Charging / solar module
        - Control module
        - Sensor module
        - Chassis / enclosure
        - HMI / lighting
        - Logging / telemetry
        - Safety
        - System-wide / cross-cutting
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: Parent issue
      description: Link the higher-level requirement, feature, or epic if one exists.
      placeholder: '#123'

  - type: textarea
    id: related_work
    attributes:
      label: Related issues / PRs / discussions
      description: Link any connected work items.
      placeholder: |-
        Related: #45
        Blocks: #67
        Decision record: #89

  - type: dropdown
    id: category
    attributes:
      label: Evaluation category
      options:
        - Actuator / motor
        - Sensor
        - Battery / energy storage
        - Power electronics
        - MCU / compute
        - PCB / connector / interconnect
        - Mechanical part / material
        - Enclosure / sealing element
        - Storage / communication module
        - Other
    validations:
      required: true

  - type: textarea
    id: decision_needed
    attributes:
      label: Decision needed
      placeholder: Select blade motor driver architecture for prototype A.
    validations:
      required: true

  - type: textarea
    id: candidates
    attributes:
      label: Candidates
      placeholder: |-
        Candidate A
        Candidate B
        Candidate C
    validations:
      required: true

  - type: textarea
    id: criteria
    attributes:
      label: Comparison criteria
      placeholder: Torque, current, efficiency, cost, availability, size, protection features, ease of control.
    validations:
      required: true

  - type: textarea
    id: recommendation
    attributes:
      label: Recommendation / selected option
      placeholder: Summarize the preferred option and why.

  - type: textarea
    id: procurement_next
    attributes:
      label: Next step
      placeholder: Order samples, create test issue, update schematic, or defer decision.
