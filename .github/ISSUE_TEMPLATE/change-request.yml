name: Change Request
description: Propose a controlled change to a requirement, design, architecture, or baseline.
title: "[CR] "
labels:
  - "type: change-request"
body:
  - type: markdown
    attributes:
      value: |
        Use this form when an approved baseline needs to change.
        A change request can affect multiple disciplines and multiple child tasks.

  - type: dropdown
    id: discipline
    attributes:
      label: Discipline
      description: Which engineering domain mainly owns this issue?
      options:
        - Mechanical
        - Electronics / power
        - Firmware / software
        - Test / validation
        - Systems / integration
        - Manufacturing / documentation
        - Multi-disciplinary
    validations:
      required: true

  - type: dropdown
    id: assembly
    attributes:
      label: Assembly / module
      description: Which physical or logical assembly is primarily affected?
      options:
        - Cutting module
        - Drive module
        - Energy module
        - Charging / solar module
        - Control module
        - Sensor module
        - Chassis / enclosure
        - HMI / lighting
        - Logging / telemetry
        - Safety
        - System-wide / cross-cutting
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: Parent issue
      description: Link the higher-level requirement, feature, or epic if one exists.
      placeholder: '#123'

  - type: textarea
    id: related_work
    attributes:
      label: Related issues / PRs / discussions
      description: Link any connected work items.
      placeholder: |-
        Related: #45
        Blocks: #67
        Decision record: #89

  - type: dropdown
    id: change_scope
    attributes:
      label: Change scope
      options:
        - Requirement change
        - Design change
        - Architecture change
        - Component substitution
        - Manufacturing change
        - Test strategy change
        - Documentation baseline change
    validations:
      required: true

  - type: textarea
    id: current_state
    attributes:
      label: Current baseline
      placeholder: Describe the current requirement, design, or selected part.
    validations:
      required: true

  - type: textarea
    id: proposed_change
    attributes:
      label: Proposed change
      placeholder: Replace brushed blade motor driver concept with BLDC controller architecture.
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for change
      placeholder: Reliability, safety, cost, supply, measured performance, integration complexity.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact assessment
      placeholder: Affected requirements, firmware, PCB, CAD, tests, cost, schedule, risks.
    validations:
      required: true

  - type: textarea
    id: verification_updates
    attributes:
      label: Required follow-up
      placeholder: New tests, updated documents, migration steps, rework tasks.
