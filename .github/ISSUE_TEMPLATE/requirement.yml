name: Requirement
description: Capture a verifiable product, subsystem, or interface requirement.
title: "[REQ] "
labels:
  - "type: requirement"
body:
  - type: markdown
    attributes:
      value: |
        Use this form for requirements. Keep the requirement independent from the implementation.
        The same assembly can later have separate mechanical, electronics, and firmware tasks linked back to this issue.

  - type: dropdown
    id: requirement_level
    attributes:
      label: Requirement level
      options:
        - Product / system
        - Assembly / subsystem
        - Interface
        - Safety
        - Regulatory / environmental
        - Manufacturing / service
    validations:
      required: true

  - type: dropdown
    id: discipline
    attributes:
      label: Discipline
      description: Which engineering domain mainly owns this issue?
      options:
        - Mechanical
        - Electronics / power
        - Firmware / software
        - Test / validation
        - Systems / integration
        - Manufacturing / documentation
        - Multi-disciplinary
    validations:
      required: true

  - type: dropdown
    id: assembly
    attributes:
      label: Assembly / module
      description: Which physical or logical assembly is primarily affected?
      options:
        - Cutting module
        - Drive module
        - Energy module
        - Charging / solar module
        - Control module
        - Sensor module
        - Chassis / enclosure
        - HMI / lighting
        - Logging / telemetry
        - Safety
        - System-wide / cross-cutting
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: Parent issue
      description: Link the higher-level requirement, feature, or epic if one exists.
      placeholder: '#123'

  - type: textarea
    id: related_work
    attributes:
      label: Related issues / PRs / discussions
      description: Link any connected work items.
      placeholder: |-
        Related: #45
        Blocks: #67
        Decision record: #89

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Must have
        - Should have
        - Could have
    validations:
      required: true

  - type: input
    id: requirement_id
    attributes:
      label: Requirement ID
      description: Optional project-specific ID.
      placeholder: REQ-CUT-001

  - type: textarea
    id: requirement_statement
    attributes:
      label: Requirement statement
      description: Write one clear shall-statement.
      placeholder: The mower shall stop the cutting function within X ms after a tip-over event is detected.
    validations:
      required: true

  - type: textarea
    id: rationale
    attributes:
      label: Rationale / source
      description: Why is this requirement needed?
      placeholder: Safety objective, user need, standard, design decision, benchmark result, etc.
    validations:
      required: true

  - type: textarea
    id: verification_criterion
    attributes:
      label: Verification criterion
      description: How will success be judged?
      placeholder: Pass if the cutting motor command is disabled and current decays below X A within Y ms during test setup Z.
    validations:
      required: true

  - type: dropdown
    id: verification_method
    attributes:
      label: Planned verification method
      options:
        - Test
        - Analysis
        - Inspection
        - Demonstration
        - Combination
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints and assumptions
      placeholder: Weight, energy budget, size, IP rating, cost target, architecture assumptions, manufacturing constraints.

  - type: checkboxes
    id: quality_check
    attributes:
      label: Quality check
      options:
        - label: I wrote the requirement as a single clear statement.
          required: true
        - label: I included a rationale or source.
          required: true
        - label: I included a verifiable criterion.
          required: true
