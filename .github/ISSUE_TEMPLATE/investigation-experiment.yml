name: Investigation / Experiment
description: Track an experiment, research activity, or engineering investigation.
title: "[INV] "
labels:
  - "type: investigation"
body:
  - type: markdown
    attributes:
      value: |
        Use this form for exploratory work where the outcome is not yet known.
        This is ideal for control tuning, sensor trials, efficiency studies, and trade-off experiments.

  - type: dropdown
    id: discipline
    attributes:
      label: Discipline
      description: Which engineering domain mainly owns this issue?
      options:
        - Mechanical
        - Electronics / power
        - Firmware / software
        - Test / validation
        - Systems / integration
        - Manufacturing / documentation
        - Multi-disciplinary
    validations:
      required: true

  - type: dropdown
    id: assembly
    attributes:
      label: Assembly / module
      description: Which physical or logical assembly is primarily affected?
      options:
        - Cutting module
        - Drive module
        - Energy module
        - Charging / solar module
        - Control module
        - Sensor module
        - Chassis / enclosure
        - HMI / lighting
        - Logging / telemetry
        - Safety
        - System-wide / cross-cutting
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: Parent issue
      description: Link the higher-level requirement, feature, or epic if one exists.
      placeholder: '#123'

  - type: textarea
    id: related_work
    attributes:
      label: Related issues / PRs / discussions
      description: Link any connected work items.
      placeholder: |-
        Related: #45
        Blocks: #67
        Decision record: #89

  - type: dropdown
    id: investigation_kind
    attributes:
      label: Investigation kind
      options:
        - Research / literature scan
        - Bench experiment
        - Field experiment
        - Algorithm comparison
        - Architecture trade-off
        - Failure analysis
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question / hypothesis
      placeholder: Which blade motor control strategy gives the best startup behavior for the available battery and driver hardware?
    validations:
      required: true

  - type: textarea
    id: method
    attributes:
      label: Method
      placeholder: Compare PWM ramp profiles A/B/C, measure inrush current, spin-up time, heating, and grass-cut quality proxy.
    validations:
      required: true

  - type: textarea
    id: evaluation
    attributes:
      label: Evaluation criteria
      placeholder: Peak current, efficiency, stability, implementation complexity, component stress.
    validations:
      required: true

  - type: textarea
    id: findings
    attributes:
      label: Findings / conclusion
      placeholder: Summarize what was learned and what should happen next.

  - type: textarea
    id: follow_up
    attributes:
      label: Follow-up actions
      placeholder: Create implementation task, update requirement, open change request, or close with no action.
